<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindGate</title>
    <style>
      #mg-splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        background: #ffffff; color: #1c1c1e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        z-index: 2147483647;
      }
      #mg-splash .dot { width: 10px; height: 10px; border-radius: 50%; background: #34c759; animation: pulse 1.5s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      #mg-splash .title { font-size: 16px; font-weight: 600; }
      #mg-splash .sub { font-size: 13px; color: #8e8e93; }
      #mg-splash.hidden { display: none; }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background: #ffffff; overflow: hidden;">
    <div id="mg-splash">
      <div class="dot"></div>
      <div class="title">MindGate</div>
      <div class="sub">Loading...</div>
    </div>
    <div id="root"></div>
    <script>
      const splash = document.getElementById('mg-splash');
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          splash.classList.add('hidden');
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      setTimeout(() => { splash.classList.add('hidden'); }, 8000);
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
